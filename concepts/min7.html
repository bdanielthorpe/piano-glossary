<h1 style="margin: 0.0px 0.0px 16.1px 0.0px; font: 24.0px Times; color: #000000; -webkit-text-stroke: #000000"><span class="s3"><b>Minor 7th Chord</b></span></h1>
<p class="p3"><span class="s3">min7</span></p>
<p class="p4"><span class="s3"><b>Prerequisites</b> <a href="file:///Users/Ben/Music/My%20Music/piano-glossary/concepts/minor-triad.html"><span class="s4">Minor triad</span></a><span class="Apple-converted-space"> </span></span></p>
<p class="p5"><span class="s3"></span><br></p>
<p class="p3"><span class="s3">A minor 7th chord is a minor triad with an additional interval of a minor seventh from the root. Equivalently, we can think of the minor seventh as living a tone below the root.</span></p>
