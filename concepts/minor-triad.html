  <p>The minor triad is created by stacking a major third on top of a minor third.</p>


  <p>Formula:</p>
  <div class="voicing">1 · b3 · 5</div>

  <p>Intervals:</p>
  <div class="voicing">m3 · M3</div>

  <p>Example:</p>
  <div class="voicing">C · Eb · G</div>

  <p>Fancy voicing:</p>
  <div class="voicing">C · G · Eb</div>
